services:
  stream-server:
    build: .
    container_name: kick-stream-server
    ports:
      - "1935:1935"
    volumes:
      - ./assets:/assets
      - ./templates/nginx.conf.template:/etc/nginx/nginx.conf.template
    env_file:
      - .env
    environment:
      - KICK_STREAM_URL
      - KICK_STREAM_KEY
      - KICK_STREAM_HOST
      - FALLBACK_VIDEO
      - FFMPEG_PRESET
      - FFMPEG_BITRATE
      - FFMPEG_BUFSIZE
      - GOP_SIZE
      - UDP_FIFO_SIZE
      - STREAM_FPS
      - FALLBACK_DELAY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1935"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
