worker_processes auto;
rtmp_auto_push on;
events {}
rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        application ingest {
            live on;
            record off;
            
            # This is where the user will push their stream (e.g., OBS)
            # URL: rtmp://localhost/ingest/stream
        }
    }
}
